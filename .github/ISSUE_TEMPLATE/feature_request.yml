name: Feature request
description: Suggest an idea or improvement for gantt-ng
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve gantt-ng! Please describe your idea below.

        Before submitting, please [search existing issues](https://github.com/v1centebarros/gantt-ng/issues?q=is%3Aissue) to see if it has already been requested.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your feature request related to a problem? A clear description of what the pain point is.
      placeholder: I'm always frustrated when I can't link two tasks to show a dependency...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or screenshots about the request here.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This feature keeps gantt-ng local-first (no backend or accounts required).
          required: false
